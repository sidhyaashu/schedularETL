services:

  # ── Production scheduler ─────────────────────────────────────────────────
  scheduler_ingestion:
    build: .
    image: clean-scheduler-ingestion:latest
    container_name: clean_scheduler_ingestion
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    command: ["python", "-m", "app.main"]
    restart: unless-stopped
